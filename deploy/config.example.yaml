# Data source: "serial" (VE.Direct USB, default) or "ble" (Bluetooth Instant Readout).
source: serial
serial:
  port: /dev/victron      # udev symlink to the VE.Direct USB adapter
  baud: 19200
# Bluetooth source (when source: ble) — needs the `ble` extra (victron-ble, bleak) and BT on.
# Live subset only (no pv_voltage / yield_total / max_power / daily history). The encryption
# key goes in a 0600 file, NOT here (VictronConnect → device → Product info → Instant readout).
ble:
  mac: ""                 # e.g. DA:4B:25:C4:61:34
  key_file: /etc/vedirect-influx/ble_key.txt
live_interval_s: 15
history:
  enabled: true
  poll_on_start: true
  daily_at: "00:05"       # local time to refresh daily history
sink:
  type: influxdb          # influxdb | stdout
  url: http://localhost:8086
  org: home
  bucket: victron
  token_env: INFLUXDB_TOKEN   # token read from this env var (never in the file)
  live_measurement: victron_mppt
  history_measurement: victron_history_daily
  tags:
    device: mppt-75-15

# Optional: also upload to the Victron VRM Portal (no Venus OS). Runs alongside the
# sink above. Register first: `vedirect-influx -c config.yaml vrm-register`. See docs/VRM.md.
vrm:
  enabled: false
  # iface: eth0              # interface whose MAC becomes the VRM Portal ID
  # portal_id: ""            # set to override the MAC-derived ID
  custom_name: "My MPPT"
  product_id: 0xA075         # 0xA075 = SmartSolar MPPT 75/15
  interval_s: 60
  auth_token_file: /etc/vedirect-influx/vrm_auth_token.txt
  # history_backfill: false  # experimental: upload >1-day-old history via TO

# Optional, EXPERIMENTAL (Linux/Pi only): expose registers to the VictronConnect-Remote
# D-Bus service over a local socket. Off by default. Needs the `vcr` extra + the Venus
# component stack -- see docs/vcr-component-assembly-scope.md.
vreg:
  ipc_enabled: false
  # ipc_socket: /run/vedirect-influx/vreg.sock
