# CodeRabbit AI code-review configuration.
# Docs: https://docs.coderabbit.ai/  (schema: https://coderabbit.ai/integrations/schema.v2.json)
language: en-US
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    drafts: false
  # lean on the repo's own linters; don't duplicate their findings
  tools:
    ruff:
      enabled: true
    markdownlint:
      enabled: true
    yamllint:
      enabled: true
    actionlint:
      enabled: true
    gitleaks:
      enabled: true
chat:
  auto_reply: true
